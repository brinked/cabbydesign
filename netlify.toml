[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Single-page app: serve index.html for any path (safety net; the app has no router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache the hashed asset bundles
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
