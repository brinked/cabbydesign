# Render Blueprint. In the Render dashboard: New → Blueprint → pick this repo.
# Render reads this file and provisions the service + disk below.
#
# Before the first deploy goes live, set ADMIN_EMAIL + ADMIN_PASSWORD in the
# dashboard (they're marked sync:false = secrets). On boot the server ensures
# that admin exists with that password so you can sign in. Remove them later.
services:
  - type: web
    name: cabbydesign
    runtime: node
    # A persistent disk requires a paid instance type (Starter or higher).
    plan: starter
    # --include=dev forces devDependencies (vite, typescript, @types/*) which
    # Render's production install would otherwise skip — they're needed to build.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run server
    healthCheckPath: /api/health
    # Dealers are seeded from importdealers.txt on server startup (idempotent),
    # so no pre-deploy step is needed. Set SKIP_DEALER_IMPORT=1 to disable.
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true # Render generates and stores a strong secret once
      - key: DB_PATH
        value: /var/data/cabbydesign.db
      - key: ADMIN_EMAIL
        sync: false # set in dashboard (e.g. extcabinets@gmail.com)
      - key: ADMIN_PASSWORD
        sync: false # set in dashboard (min 8 chars) for first sign-in
      # Public URL of the deployed app — used in password-reset email links.
      - key: APP_URL
        sync: false # e.g. https://cabbydesign.onrender.com (or your custom domain)
      # Outbound email (Google Workspace SMTP). Order notifications + password
      # resets. SMTP_USER = info@extcabinets.com, SMTP_PASS = an App Password
      # (Google account → Security → 2-Step Verification → App passwords).
      - key: SMTP_USER
        sync: false # info@extcabinets.com
      - key: SMTP_PASS
        sync: false # 16-char Google App Password (NOT the normal login password)
      # Optional overrides (sensible defaults in server/config.ts):
      #   SMTP_HOST (smtp.gmail.com), SMTP_PORT (465),
      #   EMAIL_FROM ('EXT Cabinets <info@extcabinets.com>'),
      #   EMAIL_TO   (extcabinets@gmail.com — where orders are sent)
    disk:
      name: cabbydesign-data
      mountPath: /var/data
      sizeGB: 1
